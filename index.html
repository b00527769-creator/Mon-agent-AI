<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Agent IA — Entrepreneur</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #efefec;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9c9a92;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 8px;
    --radius-lg: 12px;
    --purple-bg: #EEEDFE; --purple-text: #3C3489;
    --teal-bg: #E1F5EE; --teal-text: #085041;
    --amber-bg: #FAEEDA; --amber-text: #633806;
    --green-bg: #EAF3DE; --green-text: #27500A;
    --red-bg: #FCEBEB; --red-text: #791F1F;
    --success-bg: #EAF3DE; --success-text: #27500A; --success-border: rgba(59,109,17,0.3);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #e8e6dc; --text2: #9c9a92; --text3: #6b6b67;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --purple-bg: #26215C; --purple-text: #AFA9EC;
      --teal-bg: #04342C; --teal-text: #9FE1CB;
      --amber-bg: #412402; --amber-text: #FAC775;
      --green-bg: #173404; --green-text: #C0DD97;
      --red-bg: #501313; --red-text: #F7C1C1;
      --success-bg: #173404; --success-text: #C0DD97; --success-border: rgba(192,221,151,0.3);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 740px; margin: 0 auto; }

  /* Header */
  .app-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 1.5rem; padding-bottom: 1rem;
    border-bottom: 0.5px solid var(--border);
  }
  .app-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--purple-bg); display: flex; align-items: center;
    justify-content: center; font-size: 18px; flex-shrink: 0;
  }
  .app-title { font-size: 17px; font-weight: 600; color: var(--text); }
  .app-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

  /* Nav */
  .nav { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .nav-btn {
    font-size: 12px; padding: 6px 14px; border-radius: var(--radius);
    border: 0.5px solid var(--border); cursor: pointer;
    color: var(--text2); background: var(--bg);
    transition: all .15s; font-family: inherit;
  }
  .nav-btn:hover { border-color: var(--border2); color: var(--text); }
  .nav-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Cards */
  .card {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 1rem 1.2rem;
    margin-bottom: 10px;
  }
  .card:hover { border-color: var(--border2); }

  /* Buttons */
  button {
    font-family: inherit; font-size: 13px; cursor: pointer;
    padding: 7px 14px; border-radius: var(--radius);
    border: 0.5px solid var(--border2); background: var(--bg);
    color: var(--text); transition: all .15s;
  }
  button:hover { background: var(--bg2); }
  button:active { transform: scale(0.98); }
  button.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  button.primary:hover { opacity: 0.85; }

  /* Inputs */
  input[type=text], select, textarea {
    font-family: inherit; font-size: 13px;
    padding: 7px 11px; border-radius: var(--radius);
    border: 0.5px solid var(--border2); background: var(--bg);
    color: var(--text); outline: none; width: 100%;
    transition: border-color .15s;
  }
  input[type=text]:focus, select:focus, textarea:focus { border-color: var(--text); }

  /* Stat grid */
  .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.25rem; }
  .stat-card { background: var(--bg2); border-radius: var(--radius); padding: 10px 14px; }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .stat-val { font-size: 24px; font-weight: 600; color: var(--text); }

  /* Motivation */
  .quote-text { font-size: 15px; line-height: 1.75; color: var(--text); margin-bottom: 10px; font-style: italic; }
  .quote-source { font-size: 12px; color: var(--text2); margin-bottom: 14px; }
  .action-row { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Reminders */
  .reminder-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .reminder-item.done .reminder-title { text-decoration: line-through; opacity: .5; }
  .check {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--border2); flex-shrink: 0;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; margin-top: 1px; transition: all .15s;
  }
  .check.done { background: var(--success-bg); border-color: var(--success-border); }
  .check-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success-text); display: none; }
  .check.done .check-dot { display: block; }
  .reminder-body { flex: 1; }
  .reminder-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .reminder-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; display: inline-block; margin-top: 4px; }
  .tag-urgent { background: var(--red-bg); color: var(--red-text); }
  .tag-week { background: var(--amber-bg); color: var(--amber-text); }
  .tag-month { background: var(--green-bg); color: var(--green-text); }
  .add-row { display: flex; gap: 8px; margin-top: 14px; }
  .add-row input { flex: 1; }
  .add-row select { width: auto; flex-shrink: 0; }
  .summary-box {
    margin-top: 14px; font-size: 13px; color: var(--text2);
    line-height: 1.7; padding: 12px; border-radius: var(--radius);
    background: var(--bg2); border: 0.5px solid var(--border);
    display: none;
  }

  /* Ideas */
  .filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filters select { width: auto; }
  .idea-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .idea-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .level { font-size: 11px; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
  .level-deb { background: var(--green-bg); color: var(--green-text); }
  .level-int { background: var(--amber-bg); color: var(--amber-text); }
  .level-adv { background: var(--purple-bg); color: var(--purple-text); }
  .idea-desc { font-size: 13px; color: var(--text2); line-height: 1.55; margin-bottom: 8px; }
  .idea-footer { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: var(--radius); background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border); }

  /* Chat */
  .chat-window {
    border: 0.5px solid var(--border); border-radius: var(--radius-lg);
    padding: 1rem; min-height: 200px; max-height: 400px;
    overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 10px; background: var(--bg);
  }
  .msg { max-width: 85%; }
  .msg.user { align-self: flex-end; }
  .msg.agent { align-self: flex-start; }
  .msg-name { font-size: 11px; color: var(--text3); margin-bottom: 3px; padding: 0 4px; }
  .msg-bubble { font-size: 13px; line-height: 1.6; padding: 9px 13px; border-radius: var(--radius-lg); }
  .msg.user .msg-bubble { background: var(--text); color: var(--bg); }
  .msg.agent .msg-bubble { background: var(--bg2); color: var(--text); }
  .chat-row { display: flex; gap: 8px; }
  .chat-row input { flex: 1; }

  /* Loading dots */
  .dots span { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--text2); margin: 0 2px; animation: dot .9s infinite; }
  .dots span:nth-child(2) { animation-delay: .15s; }
  .dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes dot { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  /* API key banner */
  .api-banner {
    background: var(--amber-bg); border: 0.5px solid var(--amber-text);
    border-radius: var(--radius); padding: 10px 14px; margin-bottom: 1rem;
    font-size: 13px; color: var(--amber-text);
  }
  .api-banner input { margin-top: 8px; background: var(--bg); }
  .api-banner button { margin-top: 6px; font-size: 12px; padding: 5px 10px; }
</style>
</head>
<body>
<div class="container">

  <div class="app-header">
    <div class="app-avatar">🤖</div>
    <div>
      <div class="app-title">Mon Agent IA — Entrepreneur</div>
      <div class="app-sub">Motivation · Rappels · Formation · Coach IA</div>
    </div>
  </div>

  <div class="api-banner" id="api-banner">
    <strong>Clé API Anthropic requise</strong> pour les fonctionnalités IA (résumés, nouvelles idées, chat).<br>
    Obtiens ta clé sur <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> (gratuit pour tester)
    <input type="password" id="api-key-input" placeholder="sk-ant-..." />
    <button onclick="saveApiKey()">Enregistrer la clé</button>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="show('motivation',this)">Motivation</button>
    <button class="nav-btn" onclick="show('rappels',this)">Rappels</button>
    <button class="nav-btn" onclick="show('formation',this)">Formation</button>
    <button class="nav-btn" onclick="show('chat',this)">Coach IA</button>
  </div>

  <!-- MOTIVATION -->
  <div id="panel-motivation" class="panel active">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Agents construits</div><div class="stat-val" id="s-agents">0</div></div>
      <div class="stat-card"><div class="stat-label">Jours de streak</div><div class="stat-val" id="s-streak">1</div></div>
      <div class="stat-card"><div class="stat-label">Idées testées</div><div class="stat-val" id="s-ideas">0</div></div>
    </div>
    <div class="card" id="motiv-card">
      <div class="quote-text" id="motiv-quote"></div>
      <div class="quote-source" id="motiv-source"></div>
      <div class="action-row">
        <button onclick="nextMotiv()">Nouvelle citation</button>
        <button onclick="inc('s-agents','agents')">+1 agent construit</button>
        <button onclick="inc('s-ideas','ideas')">+1 idée testée</button>
      </div>
    </div>
  </div>

  <!-- RAPPELS -->
  <div id="panel-rappels" class="panel">
    <div id="reminders-container"></div>
    <div class="add-row">
      <input type="text" id="new-reminder" placeholder="Nouveau rappel..." />
      <select id="new-tag">
        <option value="urgent">Urgent</option>
        <option value="week" selected>Cette semaine</option>
        <option value="month">Ce mois</option>
      </select>
      <button onclick="addReminder()">Ajouter</button>
    </div>
    <div style="margin-top:14px">
      <button class="primary" onclick="summarize()">Résumer mes rappels avec l'IA ↗</button>
    </div>
    <div class="summary-box" id="summary-box"></div>
  </div>

  <!-- FORMATION -->
  <div id="panel-formation" class="panel">
    <div class="filters">
      <select id="level-filter" onchange="renderIdeas()">
        <option value="all">Tous niveaux</option>
        <option value="deb">Débutant</option>
        <option value="int">Intermédiaire</option>
        <option value="adv">Avancé</option>
      </select>
      <button class="primary" onclick="genIdeas()">Générer de nouvelles idées ↗</button>
    </div>
    <div id="ideas-container"></div>
  </div>

  <!-- CHAT -->
  <div id="panel-chat" class="panel">
    <div class="chat-window" id="chat-window"></div>
    <div class="chat-row">
      <input type="text" id="chat-in" placeholder="Pose une question à ton coach IA..." onkeydown="if(event.key==='Enter')chat()" />
      <button class="primary" onclick="chat()">Envoyer</button>
    </div>
  </div>

</div>

<script>
// ─── State ───────────────────────────────────────────────
let apiKey = localStorage.getItem('anthropic_key') || '';
let stats = JSON.parse(localStorage.getItem('agent_stats') || '{"agents":0,"streak":1,"ideas":0}');
let motivIdx = 0;
let chatHistory = [];
let nextId = 10;

const IDEAS = [
  {id:1,title:"Comprendre le run loop en 30 min",level:"deb",desc:"Dessine la boucle observer-raisonner-agir sur papier, puis crée un agent Make qui envoie un email automatique. Tu verras le loop en action sans coder.",tags:["pratique","Make","30 min"]},
  {id:2,title:"Lire le guide officiel Anthropic",level:"deb",desc:"Le guide d'Anthropic sur les agents est le meilleur point de départ. Dense mais clair. 45 min avec un café suffisent.",tags:["lecture","fondamentaux"]},
  {id:3,title:"Tester le prompt ReAct",level:"int",desc:"ReAct (Reasoning + Acting) est la colonne vertébrale de la plupart des agents en prod. Implémente-le manuellement une fois pour comprendre pourquoi ça marche.",tags:["prompting","patterns"]},
  {id:4,title:"Construire un agent de veille concurrentielle",level:"int",desc:"Agent qui cherche chaque matin les news sur tes concurrents, résume en 3 bullets et t'envoie ça par email. Premier agent business avec ROI immédiat.",tags:["n8n","email","business"]},
  {id:5,title:"Créer un agent de qualification de leads",level:"int",desc:"Agent qui lit les nouveaux leads dans ton CRM, les score avec l'IA, et t'envoie une synthèse chaque soir. Idéal pour tout fondateur.",tags:["CRM","sales","Make"]},
  {id:6,title:"Implémenter la mémoire long terme",level:"adv",desc:"Connecte Supabase pgvector à ton agent pour qu'il se souvienne des interactions passées. La courbe monte mais l'agent devient 10x plus puissant.",tags:["Supabase","vecteurs","Python"]},
  {id:7,title:"Déployer un agent multi-rôles avec CrewAI",level:"adv",desc:"Crée une équipe de 3 agents : chercheur, analyste, rédacteur. Donne-leur un objectif commun. Observe comment ils se coordonnent.",tags:["CrewAI","multi-agent"]},
  {id:8,title:"Calculer le ROI de ton premier agent",level:"deb",desc:"Estime le temps gagné par semaine × ton taux horaire. Compare au coût de l'API. Dans 90% des cas, le ROI est positif dès le premier mois.",tags:["business","stratégie"]},
];

const MOTIVATIONS = [
  {quote:"Chaque agent que tu construis aujourd'hui est un employé virtuel qui travaille pour toi demain — sans salaire, sans pause, sans limite.",source:"Principe fondateur des builders agentiques"},
  {quote:"Les fondateurs qui automatisent en premier ne gagnent pas plus vite — ils libèrent leur cerveau pour ce qui compte vraiment : la stratégie et les clients.",source:"Ruben Dominguez, The AI Corner"},
  {quote:"Un agent imparfait qui tourne vaut 100x plus qu'un agent parfait qui reste dans ta tête. Ship, itère, améliore.",source:"Premier principe du builder agentique"},
  {quote:"Dans 3 ans, chaque entreprise aura soit construit ses agents, soit travaillé pour quelqu'un qui l'a fait.",source:"Prédiction des analystes VC, 2026"},
  {quote:"La vraie question n'est pas 'est-ce que je sais coder ?' — c'est 'est-ce que je sais déléguer ?' Un agent, c'est de la délégation à l'échelle.",source:"Framework du fondateur augmenté"},
  {quote:"Le meilleur moment pour construire ton premier agent, c'était l'an dernier. Le deuxième meilleur moment, c'est maintenant.",source:"Adaptation du proverbe des bâtisseurs"},
];

let reminders = JSON.parse(localStorage.getItem('agent_reminders') || 'null') || [
  {id:1,title:"Construire mon premier agent Make",desc:"Workflow de veille IA avec notification email",tag:"week",done:false},
  {id:2,title:"Lire le guide Anthropic sur les agents",desc:"Fondamentaux du run loop et des outils",tag:"week",done:false},
  {id:3,title:"Tester n8n en local",desc:"Installer et créer un workflow basique",tag:"month",done:false},
  {id:4,title:"Définir mon premier cas d'usage business",desc:"Choisir le processus à automatiser en priorité",tag:"urgent",done:false},
];

// ─── Persistence ─────────────────────────────────────────
function save() {
  localStorage.setItem('agent_stats', JSON.stringify(stats));
  localStorage.setItem('agent_reminders', JSON.stringify(reminders));
}

function saveApiKey() {
  apiKey = document.getElementById('api-key-input').value.trim();
  localStorage.setItem('anthropic_key', apiKey);
  if(apiKey) document.getElementById('api-banner').style.display = 'none';
}

// ─── Navigation ──────────────────────────────────────────
function show(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
}

// ─── Motivation ──────────────────────────────────────────
function renderMotiv() {
  const m = MOTIVATIONS[motivIdx % MOTIVATIONS.length];
  document.getElementById('motiv-quote').textContent = '"' + m.quote + '"';
  document.getElementById('motiv-source').textContent = '— ' + m.source;
  document.getElementById('s-agents').textContent = stats.agents;
  document.getElementById('s-streak').textContent = stats.streak;
  document.getElementById('s-ideas').textContent = stats.ideas;
}
function nextMotiv() { motivIdx++; renderMotiv(); }
function inc(elId, key) {
  stats[key] = (stats[key]||0) + 1;
  document.getElementById(elId).textContent = stats[key];
  save();
}

// ─── Reminders ───────────────────────────────────────────
const tagLabel = {urgent:'Urgent',week:'Cette semaine',month:'Ce mois'};
const tagClass = {urgent:'tag-urgent',week:'tag-week',month:'tag-month'};

function renderReminders() {
  document.getElementById('reminders-container').innerHTML = reminders.map(r => `
    <div class="reminder-item ${r.done?'done':''}">
      <div class="check ${r.done?'done':''}" onclick="toggleR(${r.id})">
        <div class="check-dot"></div>
      </div>
      <div class="reminder-body">
        <div class="reminder-title">${r.title}</div>
        ${r.desc?`<div class="reminder-desc">${r.desc}</div>`:''}
        <span class="tag ${tagClass[r.tag]}">${tagLabel[r.tag]}</span>
      </div>
    </div>`).join('');
}
function toggleR(id) {
  const r = reminders.find(x=>x.id===id);
  if(r) { r.done = !r.done; save(); renderReminders(); }
}
function addReminder() {
  const v = document.getElementById('new-reminder').value.trim();
  const t = document.getElementById('new-tag').value;
  if(!v) return;
  reminders.push({id:nextId++, title:v, desc:'', tag:t, done:false});
  document.getElementById('new-reminder').value = '';
  save(); renderReminders();
}
async function summarize() {
  if(!apiKey) { alert('Entre ta clé API Anthropic en haut de la page.'); return; }
  const box = document.getElementById('summary-box');
  const pending = reminders.filter(r=>!r.done);
  if(!pending.length) { box.style.display='block'; box.textContent='Tous tes rappels sont cochés. Parfait !'; return; }
  box.style.display = 'block';
  box.textContent = 'Résumé en cours...';
  const list = pending.map(r=>`- ${r.title} [${tagLabel[r.tag]}]${r.desc?' : '+r.desc:''}`).join('\n');
  const reply = await callClaude(
    'Tu es un coach IA pour entrepreneurs qui construisent des agents IA. Sois motivant, direct, pratique. Réponds en français.',
    `Voici mes rappels en attente :\n${list}\n\nFais un résumé en 3 parties :\n1) Ce qui est urgent à traiter\n2) Ce qui avance bien\n3) Un conseil prioritaire pour cette semaine\n\nSois direct et encourageant. 5-6 phrases max.`
  );
  box.innerHTML = reply.replace(/\n/g,'<br>');
}

// ─── Ideas ───────────────────────────────────────────────
const levelLabel = {deb:'Débutant',int:'Intermédiaire',adv:'Avancé'};
const levelClass = {deb:'level-deb',int:'level-int',adv:'level-adv'};

function renderIdeas() {
  const f = document.getElementById('level-filter').value;
  const filtered = f==='all' ? IDEAS : IDEAS.filter(i=>i.level===f);
  document.getElementById('ideas-container').innerHTML = filtered.map(i=>`
    <div class="card">
      <div class="idea-header">
        <div class="idea-title">${i.title}</div>
        <span class="level ${levelClass[i.level]}">${levelLabel[i.level]}</span>
      </div>
      <div class="idea-desc">${i.desc}</div>
      <div class="idea-footer">
        ${i.tags.map(t=>`<span class="badge">${t}</span>`).join('')}
      </div>
    </div>`).join('');
}
async function genIdeas() {
  if(!apiKey) { alert('Entre ta clé API Anthropic en haut de la page.'); return; }
  document.getElementById('ideas-container').innerHTML = '<div style="padding:1rem;color:var(--text2);font-size:13px">Génération en cours...</div>';
  const reply = await callClaude(
    'Tu es un expert en formation IA pour entrepreneurs. Réponds UNIQUEMENT en JSON valide, sans markdown ni backticks.',
    'Génère 4 idées pratiques de formation sur les agents IA pour un créateur d\'entreprise non-technique. JSON strict : {"ideas":[{"title":"...","level":"deb|int|adv","desc":"2 phrases max concrètes","tags":["tag1","tag2"]}]}'
  );
  try {
    const json = JSON.parse(reply.match(/\{[\s\S]*\}/)?.[0]||'{}');
    if(json.ideas) json.ideas.forEach(i=>{ i.id=nextId++; IDEAS.push(i); });
  } catch(e) {}
  renderIdeas();
}

// ─── Chat ────────────────────────────────────────────────
const SYSTEM_CHAT = `Tu es un agent IA coach pour un créateur d'entreprise qui apprend à construire des agents IA.
Tu es motivant, pragmatique, direct. Tu parles toujours en français.
Tu maîtrises les outils no-code (Make, n8n, Zapier, Dify), les frameworks (LangChain, CrewAI), et les LLMs (Claude, GPT, Gemini).
Tu donnes des conseils concrets avec des exemples business réels.
Garde tes réponses courtes (4-6 phrases) sauf si on demande un guide complet.`;

function addMsg(role, text) {
  const w = document.getElementById('chat-window');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = `<div class="msg-name">${role==='user'?'Toi':'Coach IA'}</div><div class="msg-bubble">${text}</div>`;
  w.appendChild(d);
  w.scrollTop = w.scrollHeight;
  return d;
}
async function chat() {
  if(!apiKey) { alert('Entre ta clé API Anthropic en haut de la page.'); return; }
  const input = document.getElementById('chat-in');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  addMsg('user', text);
  chatHistory.push({role:'user',content:text});
  const ld = addMsg('agent','<div class="dots"><span></span><span></span><span></span></div>');
  const reply = await callClaudeChat();
  chatHistory.push({role:'assistant',content:reply});
  ld.querySelector('.msg-bubble').textContent = reply;
}
async function callClaudeChat() {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:SYSTEM_CHAT,messages:chatHistory})
    });
    const d = await res.json();
    return d.content?.[0]?.text || 'Erreur de réponse.';
  } catch(e) { return 'Erreur de connexion. Vérifie ta clé API.'; }
}
async function callClaude(system, userMsg) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:700,system,messages:[{role:'user',content:userMsg}]})
    });
    const d = await res.json();
    return d.content?.[0]?.text || 'Erreur.';
  } catch(e) { return 'Erreur de connexion.'; }
}
